<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月商1000万円ロードマップ Podcast｜杜の都工房</title>
<style>
  :root {
    --primary: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --accent: #e94560;
    --gold: #f5a623;
    --green: #27ae60;
    --blue: #2980b9;
    --text: #e8e8e8;
    --muted: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--primary);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== PLAYER HEADER ===== */
  .player-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .player-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 16px 0;
  }

  .player-title-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }

  .cover-art {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .player-meta { flex: 1; }

  .player-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .player-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* progress */
  .progress-area {
    margin-bottom: 12px;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    margin-bottom: 6px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  /* controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
    padding: 0;
  }

  .btn:hover { opacity: 0.7; }

  .btn-play {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    color: white;
    font-size: 16px;
  }

  .btn-nav {
    width: 32px;
    height: 32px;
    font-size: 14px;
    color: var(--muted);
  }

  .btn-nav:hover { color: var(--text); }

  .speed-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .speed-btn:hover, .speed-btn.active { background: rgba(245,166,35,0.15); color: var(--gold); border-color: var(--gold); }

  .chapter-name {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    text-align: center;
  }

  /* ===== CHAPTER LIST ===== */
  .content-area {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .chapter-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 40px;
  }

  .chapter-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    border: 1px solid transparent;
  }

  .chapter-item:hover {
    background: rgba(255,255,255,0.04);
  }

  .chapter-item.active {
    background: rgba(233, 69, 96, 0.08);
    border-color: rgba(233, 69, 96, 0.25);
  }

  .chapter-item.playing {
    background: rgba(245, 166, 35, 0.07);
    border-color: rgba(245, 166, 35, 0.2);
  }

  .ch-num {
    font-size: 11px;
    color: var(--muted);
    width: 28px;
    flex-shrink: 0;
    margin-top: 2px;
    font-weight: 600;
  }

  .ch-info { flex: 1; }

  .ch-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .ch-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .ch-duration {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .playing-indicator {
    display: none;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    margin-top: 2px;
    align-items: center;
    gap: 2px;
  }

  .playing-indicator span {
    display: block;
    width: 3px;
    background: var(--gold);
    border-radius: 2px;
    animation: eq 0.8s ease-in-out infinite;
  }

  .playing-indicator span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .playing-indicator span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .playing-indicator span:nth-child(3) { height: 6px; animation-delay: 0.3s; }

  @keyframes eq {
    0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .chapter-item.playing .playing-indicator {
    display: flex;
  }

  /* ===== TRANSCRIPT ===== */
  .transcript-section {
    margin-top: 40px;
  }

  .transcript-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .transcript-card:hover {
    border-color: rgba(255,255,255,0.15);
  }

  .transcript-card.active {
    border-color: var(--gold);
    background: rgba(245, 166, 35, 0.04);
  }

  .tc-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .tc-badge {
    font-size: 10px;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
  }

  .tc-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    flex: 1;
  }

  .tc-body {
    font-size: 14px;
    line-height: 2;
    color: rgba(255,255,255,0.75);
  }

  .tc-body p { margin-bottom: 12px; }
  .tc-body p:last-child { margin-bottom: 0; }

  .tc-body strong { color: var(--white); font-weight: 700; }
  .tc-body .highlight { color: var(--gold); font-weight: 600; }
  .tc-body .red { color: var(--accent); font-weight: 600; }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 32px 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    border-top: 1px solid var(--border);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<!-- ===== STICKY PLAYER ===== -->
<div class="player-header">

        <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>

      <button class="btn btn-nav" onclick="nextChapter()" title="次へ">

      </button>
      <span style="flex:1;"></span>
      <button class="speed-btn active" id="speed1" onclick="setSpeed(1, this)">1x</button>
      <button class="speed-btn" id="speed15" onclick="setSpeed(1.5, this)">1.5x</button>
      <button class="speed-btn" id="speed2" onclick="setSpeed(2, this)">2x</button>
    </div>
  </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="content-area">

  <div class="section-title">チャプター一覧</div>

  <div class="chapter-list" id="chapterList">
    <!-- JS generated -->
  </div>

  <div class="transcript-section">
    <div class="section-title">スクリプト全文</div>
    <div id="transcriptContainer">
      <!-- JS generated -->
    </div>
  </div>

</div>

<div class="footer">杜の都工房 ｜ 古き良き × 最先端 ｜ 共育・共創・共助</div>

<script>
const chapters = [
  {
    id: 1,
    badge: "イントロ",
    badgeColor: "#e94560",
    title: "月商1,000万円というゴールについて",
    desc: "このポッドキャストの目的と全体像を解説",
    duration: "3:00",
    seconds: 180,
    script: `
<p>こんにちは。杜の都工房、おがさわらともひろです。</p>
<p>今日は、杜の都工房が<span class="highlight">月商1,000万円</span>を達成するための、詳細なロードマップをお話しします。</p>
<p>最初に一つだけ伝えたいことがあります。月商1,000万円は、ぼくにとっての「ゴール」ではありません。<strong>「地方から共創の社会をつくる」というビジョンを実現するための手段</strong>です。</p>
<p>そのことを頭に置きながら聴いてもらえると、このロードマップが単なる売上計画ではなく、生き方の設計として聞こえてくると思います。</p>
<p>このポッドキャストはスライド資料と一緒に使うことを想定しています。スライドを見ながら、この音声で補足を聴くという形が一番頭に入りやすいと思います。</p>

    `
  },

    duration: "4:00",
    seconds: 240,
    script: `
<p>まず現在地を確認します。</p>
<p>杜の都工房は今、月商¥30万を目標にしているフェーズ1にいます。月商1,000万円という目標から見ると、<span class="highlight">33倍</span>というギャップがあります。</p>
<p>でもこれは、焦る数字じゃなくて、<strong>「旅のスタート地点を明確にする」</strong>数字です。</p>
<p>強みを整理します。ReactやViteを使ったフロントエンド技術は星4.5。AIと手動を組み合わせたハイブリッド制作で、通常2ヶ月かかる制作を2週間に短縮できる。キャリサポという紹介型の収益モデルも持っている。「古き良き×最先端」という唯一無二のブランドもある。</p>
<p>一方で課題もあります。<strong>SNSのフォロワーがまだ少ない。実績・顧客の声の公開が少ない。ストック収益がほぼゼロ。</strong></p>

<p>大切なのは、現在地を正直に見ること。過小評価も過大評価もしない。ここから積み上げていくということです。</p>
    `
  },
  {
    id: 3,
    badge: "全体図",
    badgeColor: "#f5a623",
    title: "5フェーズ全体ロードマップ",
    desc: "2026〜2029年の5つのフェーズを一望する",
    duration: "4:30",
    seconds: 270,
    script: `
<p>ロードマップは5つのフェーズで設計しています。</p>
<p><span class="highlight">フェーズ1</span>は今から2026年6月まで。月商¥30〜50万。「基盤を作る」フェーズです。SNS発信を習慣化して、キャリサポの紹介も動かし始めます。</p>
<p><span class="highlight">フェーズ2</span>は2026年7月から12月。月商¥50〜100万。実績を可視化して、紹介が紹介を呼ぶ仕組みを作ります。ここで初めて月商¥100万の壁を越えることを目指します。</p>
<p><span class="highlight">フェーズ3</span>が2027年。月商¥100〜300万。ここが最初の大きな転換点です。外注チームを作り、自分一人のキャパシティの壁を突破します。</p>
<p><span class="highlight">フェーズ4</span>は2028年。月商¥300〜600万。YouTube・noteを使ったメディア化と、法人として中小企業・自治体のDX支援に参入します。</p>

<p>重要なのは、各フェーズで「やること」が明確に違うということ。フェーズ1でいきなりスクール運営しようとしても上手くいかない。今のフェーズで正しいことを正しく積み上げる、それだけです。</p>
    `
  },
  {

    badge: "収益設計",
    badgeColor: "#f5a623",
    title: "月商1,000万円を支える5つの収益エンジン",

    seconds: 300,
    script: `

    desc: "今月〜来月でやること。¥37.5万達成の道筋",

    script: `

    desc: "2026年7〜12月。紹介が紹介を呼ぶ仕組みを作る",

    script: `

        <span class="tc-badge" style="background:${ch.badgeColor}22;color:${ch.badgeColor};">${ch.badge}</span>
        <span class="tc-title">${ch.title}</span>
        <span style="font-size:12px;color:var(--muted);">${ch.duration}</span>
      </div>
      <div class="tc-body">${ch.script}</div>
    `;
    div.addEventListener('click', () => selectChapter(i));
    container.appendChild(div);
  });
}

// --- Select Chapter ---
function selectChapter(index) {
  stopSpeech();
  clearInterval(timerInterval);
  currentIndex = index;
  chapterElapsed = 0;

  // Update chapter list
  document.querySelectorAll('.chapter-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    el.classList.remove('playing');
  });
  document.querySelectorAll('.transcript-card').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Update player
  const ch = chapters[index];
  document.getElementById('currentChapterName').textContent = ch.title;
  document.getElementById('totalTime').textContent = ch.duration;
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('progressFill').style.width = '0%';

  // Scroll transcript into view
  const tc = document.getElementById('tc-' + index);
  if (tc) tc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  if (isPlaying) {
    playCurrent();
  }
}

// --- Play/Pause ---
function togglePlay() {
  if (isPlaying) {
    pauseSpeech();
  } else {
    playCurrent();
  }
}

function playCurrent() {
  if (!('speechSynthesis' in window)) {
    alert('このブラウザはテキスト読み上げに対応していません。\nChromeまたはEdgeをお使いください。');
    return;
  }

  stopSpeech();

  const ch = chapters[currentIndex];
  const text = ch.script.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();

  speechUtterance = new SpeechSynthesisUtterance(text);
  speechUtterance.lang = 'ja-JP';
  speechUtterance.rate = playbackRate;
  speechUtterance.pitch = 1;

  // Try to get Japanese voice
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang === 'ja-JP' && v.localService)
    || voices.find(v => v.lang === 'ja-JP')
    || voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) speechUtterance.voice = jaVoice;

  speechUtterance.onend = () => {
    clearInterval(timerInterval);
    isPlaying = false;
    updatePlayIcon();
    document.getElementById('ch-' + currentIndex).classList.remove('playing');
    document.getElementById('progressFill').style.width = '100%';
    chapterElapsed = ch.seconds;
    updateTime(chapterElapsed, ch.seconds);
    // Auto-advance
    if (currentIndex < chapters.length - 1) {
      setTimeout(() => {
        selectChapter(currentIndex + 1);
        playCurrent();
      }, 800);
    }
  };

  speechUtterance.onerror = () => {
    isPlaying = false;
    updatePlayIcon();
    clearInterval(timerInterval);
  };

  window.speechSynthesis.speak(speechUtterance);
  isPlaying = true;
  updatePlayIcon();

  document.getElementById('ch-' + currentIndex).classList.add('playing');

  // Timer
  const totalSec = ch.seconds;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    chapterElapsed += 1 * playbackRate;
    if (chapterElapsed > totalSec) chapterElapsed = totalSec;
    const pct = Math.min((chapterElapsed / totalSec) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    updateTime(chapterElapsed, totalSec);
  }, 1000);
}

function pauseSpeech() {
  if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
    window.speechSynthesis.pause();
    isPlaying = false;
    updatePlayIcon();
    clearInterval(timerInterval);
    document.getElementById('ch-' + currentIndex).classList.remove('playing');
  } else if (window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
    isPlaying = true;
    updatePlayIcon();
    document.getElementById('ch-' + currentIndex).classList.add('playing');
    const ch = chapters[currentIndex];
    const totalSec = ch.seconds;
    timerInterval = setInterval(() => {
      chapterElapsed += 1 * playbackRate;
      if (chapterElapsed > totalSec) chapterElapsed = totalSec;
      const pct = Math.min((chapterElapsed / totalSec) * 100, 100);
      document.getElementById('progressFill').style.width = pct + '%';
      updateTime(chapterElapsed, totalSec);
    }, 1000);
  }
}

function stopSpeech() {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  isPlaying = false;
  updatePlayIcon();
  clearInterval(timerInterval);
  if (currentIndex < chapters.length) {
    document.getElementById('ch-' + currentIndex).classList.remove('playing');
  }
}

function prevChapter() {
  if (currentIndex > 0) selectChapter(currentIndex - 1);
}

function nextChapter() {
  if (currentIndex < chapters.length - 1) selectChapter(currentIndex + 1);
}

function setSpeed(rate, btn) {
  playbackRate = rate;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (speechUtterance) speechUtterance.rate = rate;
  if (isPlaying) {
    // Restart with new rate
    const idx = currentIndex;
    stopSpeech();
    currentIndex = idx;
    playCurrent();
  }
}

function seekToPosition(event) {
  const track = document.getElementById('progressTrack');
  const rect = track.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  const ch = chapters[currentIndex];
  chapterElapsed = pct * ch.seconds;
  document.getElementById('progressFill').style.width = (pct * 100) + '%';
  updateTime(chapterElapsed, ch.seconds);
}

function updatePlayIcon() {
  document.getElementById('playIcon').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('pauseIcon').style.display = isPlaying ? 'block' : 'none';
}

function updateTime(elapsed, total) {
  document.getElementById('currentTime').textContent = formatTime(Math.floor(elapsed));
  document.getElementById('totalTime').textContent = formatTime(Math.floor(total));
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

// Load voices on page load
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

// Init
buildChapterList();
buildTranscripts();
selectChapter(0);
</script>
